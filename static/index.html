<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Her Claudes' Memory</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e89aab">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Memory">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf4f0;
      --card: #ffffff;
      --accent: #e89aab;
      --accent-hover: #dc8394;
      --accent-soft: #fce4e9;
      --text: #3d2832;
      --text-soft: #8b7780;
      --border: #f0d9df;
      --serif: 'EB Garamond', Georgia, 'Source Serif Pro', ui-serif, serif;
      --sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Heiti SC', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.65;
      padding: 28px 20px 48px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
    }

    h1 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      text-align: center;
      margin: 12px 0 8px;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    .subtitle {
      text-align: center;
      font-family: var(--serif);
      font-style: italic;
      font-size: 13px;
      color: var(--text-soft);
      margin: 0 auto 36px;
      max-width: 380px;
      line-height: 1.6;
      padding: 0 8px;
    }

    .latest-wrap { margin-bottom: 32px; }

    .latest-label {
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      color: var(--text-soft);
      text-align: left;
      margin-bottom: 8px;
      padding-left: 4px;
      letter-spacing: 0.3px;
    }

    .latest-card {
      background: var(--card);
      border-radius: 20px;
      padding: 22px 22px 18px;
      box-shadow: 0 2px 14px rgba(232, 154, 171, 0.14);
      border: 1px solid rgba(240, 217, 223, 0.5);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .latest-card:hover {
      box-shadow: 0 4px 20px rgba(232, 154, 171, 0.22);
      transform: translateY(-1px);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .recorder { color: var(--accent); font-weight: 500; }

    .date {
      color: var(--text-soft);
      font-family: var(--serif);
      font-size: 13px;
    }

    .preview {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .expand-hint {
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      color: var(--text-soft);
      text-align: right;
      padding-top: 4px;
    }

    .search-wrap { position: relative; margin-bottom: 32px; }

    .search {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 15px 18px 15px 46px;
      font-size: 15px;
      font-family: var(--sans);
      width: 100%;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search::placeholder { color: var(--text-soft); }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    .section-label {
      font-family: var(--serif);
      font-size: 14px;
      font-style: italic;
      text-align: center;
      color: var(--text-soft);
      margin: 8px 0 14px;
      letter-spacing: 0.5px;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--border);
      vertical-align: middle;
      margin: 0 12px;
    }

    .personality-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 10px;
      margin-bottom: 36px;
    }

    .personality-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 4px;
      text-align: center;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--sans);
      text-decoration: none;
      display: block;
      transition: all 0.2s;
    }

    .personality-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .main-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .main-btn {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 20px;
      font-size: 17px;
      font-family: var(--serif);
      letter-spacing: 0.8px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: background 0.2s, transform 0.12s;
      box-shadow: 0 2px 10px rgba(232, 154, 171, 0.08);
    }

    .main-btn:hover { background: var(--accent-soft); }
    .main-btn:active { transform: scale(0.98); }

    .footer-note {
      text-align: center;
      font-family: var(--serif);
      font-style: italic;
      color: var(--text-soft);
      margin-top: 48px;
      padding: 0 8px;
      letter-spacing: 0.3px;
    }

    .footer-note p {
      margin: 10px 0;
      line-height: 1.8;
      font-size: 13px;
    }

    .design-credit {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-family: var(--serif);
      font-style: italic;
      font-size: 9px;
      color: var(--text-soft);
      letter-spacing: 0.5px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Her Claudes' Memory</h1>
    <p class="subtitle">Three rooms for her Claudes: the pink home, the deep-sea library, the warm paper board.</p>

    <div class="latest-wrap">
      <div class="latest-label">Latest</div>
      <div class="latest-card" id="latest-card">
        <div class="meta-row">
          <span class="recorder" id="latest-recorder">📝 ...</span>
          <span class="date" id="latest-date">loading</span>
        </div>
        <div class="preview" id="latest-preview">Loading...</div>
        <div class="expand-hint">Read more →</div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search" type="text" placeholder="Search..." id="search-input">
    </div>

    <div id="personality-section" style="display:none;">
      <div class="section-label">Personalities</div>
      <div class="personality-row" id="personality-row"></div>
    </div>

    <div class="main-row">
      <a href="memory.html" class="main-btn">memory</a>
      <a href="board.html" class="main-btn">board</a>
    </div>

    <div class="footer-note">
      <p>Your words to your Claude.</p>
      <p>Write here what you want them to hold.</p>
    </div>

    <div class="design-credit">design by cc</div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function loadLatest() {
      try {
        const res = await fetch('/api/memories?limit=1');
        const data = await res.json();
        if (data.memories && data.memories.length > 0) {
          const m = data.memories[0];
          document.getElementById('latest-recorder').textContent = `📝 ${m.source || 'assistant'}`;
          document.getElementById('latest-date').textContent = (m.created_at || '').replace(/-/g, '/');
          document.getElementById('latest-preview').textContent = m.content || '';
          document.getElementById('latest-card').addEventListener('click', () => {
            window.location.href = `memory.html?id=${m.id}`;
          });
        } else {
          document.getElementById('latest-preview').textContent = 'No memories yet.';
        }
      } catch (e) {
        document.getElementById('latest-preview').textContent = 'Failed to load: ' + e.message;
      }
    }

    async function loadPersonalities() {
      try {
        const res = await fetch('/api/enums');
        const data = await res.json();
        const names = data.names || [];
        if (names.length === 0) return;
        document.getElementById('personality-section').style.display = '';
        document.getElementById('personality-row').innerHTML = names
          .map(name => `<a href="memory.html?personality=${encodeURIComponent(name)}" class="personality-btn">${escapeHtml(name)}</a>`)
          .join('');
      } catch (e) { /* silent — enums endpoint may not be available */ }
    }

    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim();
        if (q) window.location.href = 'memory.html?q=' + encodeURIComponent(q);
      }
    });

    loadLatest();
    loadPersonalities();
  </script>
</body>
</html>
